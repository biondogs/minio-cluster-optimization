# /etc/sysctl.d/99-minio-sysctl.conf
# Consolidated kernel tunings for MinIO high-performance object storage

# --- XFS-specific optimizations for object storage ---
fs.xfs.xfssyncd_centisecs=72000     # Extended metadata flush interval (~12 minutes)
fs.xfs.filestream_centisecs=1000     # Filestream aging (~10 seconds)
fs.xfs.speculative_prealloc_lifetime=120  # Pre-allocation lifetime (2 minutes)
fs.xfs.error_level=3                 # Error reporting level

# --- Memory management and VM tuning ---
vm.dirty_background_ratio=3          # Background writeback at 3% RAM
vm.dirty_ratio=10                    # Force writeback at 10% RAM
vm.swappiness=0                      # Disable swapping entirely
vm.vfs_cache_pressure=50            # Balance between directory cache and other uses
vm.max_map_count=524288              # Support for many memory map areas

# --- File handles and async I/O limits ---
fs.file-max=4194304                  # Maximum open file handles (~4 million)
fs.aio-max-nr=2097152               # Maximum async I/O contexts (~2 million)

# --- Network optimizations for high-throughput serving ---
net.core.rmem_default=4194304      # Default receive buffer size
net.core.rmem_max=4194304          # Maximum receive buffer size
net.core.wmem_default=4194304      # Default send buffer size
net.core.wmem_max=4194304         # Maximum send buffer size
net.core.netdev_max_backlog=250000 # Network device backlog queue
net.core.somaxconn=16384            # Maximum socket connections
net.ipv4.tcp_max_syn_backlog=16384   # SYN queue for incoming connections
net.ipv4.tcp_rmem="4096 87380 4194304"  # TCP receive buffer sizes
net.ipv4.tcp_wmem="4096 65536 4194304"   # TCP send buffer sizes
net.ipv4.tcp_timestamps=0            # Disable timestamps to reduce CPU usage
net.ipv4.tcp_sack=1                  # Enable selective acknowledgments
net.ipv4.tcp_low_latency=1          # Low latency mode for TCP
net.ipv4.tcp_slow_start_after_idle=0 # Disable RFC2861 behavior
net.ipv4.tcp_mtu_probing=1          # Enable MTU probing
net.ipv4.tcp_base_mss=1280           # Base MSS for MTU probing

# --- NUMA and CPU scheduling optimizations ---
kernel.numa_balancing=1             # Enable NUMA balancing
kernel.sched_migration_cost_ns=5000000  # Migration cost to favor CPU affinity
kernel.hung_task_timeout_secs=85     # Timeout for stalled I/O threads

# --- IPv6 disabling (if not needed) ---
net.ipv6.conf.all.disable_ipv6=1
net.ipv6.conf.default.disable_ipv6=1
net.ipv6.conf.lo.disable_ipv6=1
